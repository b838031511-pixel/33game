<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Иисусий возраст</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; -webkit-user-select: none; }
        body { background-color: #222; color: white; font-family: 'Courier New', Courier, monospace; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        
        /* ИСПРАВЛЕНИЕ: ОКОШКО ИГРЫ ТЕПЕРЬ ЗАНИМАЕТ ВЕСЬ ЭКРАН */
        #game-container { 
            position: relative; 
            width: 100vw; 
            height: 100vh; 
            /* Убраны жесткие max-width и max-height, теперь игра масштабируется */
            background-color: #87CEEB; 
            overflow: hidden; 
            box-shadow: 0 0 20px rgba(0,0,0,0.8); 
        }
        canvas { display: block; width: 100%; height: 100%; cursor: pointer; }
        
        #ui-layer { position: absolute; top: 20px; left: 20px; font-size: 32px; font-weight: bold; color: #fff; text-shadow: 3px 3px 0 #000; pointer-events: none; z-index: 10; }
        #lives-display { margin-top: 10px; }
        
        #park-sign { position: absolute; top: 20px; right: 20px; font-size: 36px; font-weight: 900; color: #FFD700; text-shadow: 3px 3px 0 #8B0000, -1px -1px 0 #000; border: 4px solid #8B0000; background: rgba(255, 255, 255, 0.2); padding: 5px 15px; transform: rotate(2deg); pointer-events: none; z-index: 5; }
        
        #controls { position: absolute; bottom: 20px; left: 0; width: 100%; display: flex; justify-content: space-between; padding: 0 40px; z-index: 10; }
        .control-btn { background: rgba(255, 255, 255, 0.3); border: 2px solid white; border-radius: 10px; color: white; font-size: 20px; font-weight: bold; padding: 20px 40px; cursor: pointer; backdrop-filter: blur(5px); touch-action: manipulation; }
        .control-btn:active { background: rgba(255, 255, 255, 0.6); }
        
        #win-screen, #game-over-screen, #pause-screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.8); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 20; }
        #win-screen h1, #game-over-screen h1, #pause-screen h1 { font-size: 60px; color: #FFD700; margin-bottom: 20px; text-shadow: 3px 3px 0 #000; text-align: center;}
        #win-screen p, #game-over-screen p, #pause-screen p { font-size: 30px; margin-bottom: 30px; text-align: center;}
        #win-screen button, #game-over-screen button { background: #FFD700; color: #000; border: none; padding: 20px 40px; font-size: 24px; font-weight: bold; cursor: pointer; border-radius: 5px; transition: 0.2s; }
        #win-screen button:hover, #game-over-screen button:hover { background: #FFF; }
        
        #pause-screen { cursor: pointer; }
        .hidden { display: none !important; }
        
        @media (max-width: 800px) { 
            #ui-layer { font-size: 20px; } 
            #park-sign { font-size: 22px; top: 10px; right: 10px; } 
            .control-btn { font-size: 16px; padding: 15px 20px; } 
            #controls { padding: 0 10px; }
        }
    </style>
</head>
<body>
    <div id="game-container">
        <canvas id="gameCanvas"></canvas>
        
        <div id="ui-layer">
            <div id="score-display">Очки: <span id="score">0</span> / 33</div>
            <div id="lives-display">Жизни: <span id="lives">❤️❤️❤️</span></div>
        </div>

        <div id="park-sign">Парк "МЕЧТА"</div>

        <div id="controls">
            <button id="btn-duck" class="control-btn">ПРИСЕСТЬ (S / Вниз)</button>
            <button id="btn-jump" class="control-btn">ПРЫЖОК (W / Вверх)</button>
        </div>
        
        <div id="pause-screen" class="hidden">
            <h1>ПАУЗА</h1>
            <p>Кликните по экрану или нажмите Пробел, чтобы продолжить</p>
        </div>

        <div id="win-screen" class="hidden">
            <h1>ПОБЕДА!</h1>
            <p>Вы набрали 33 очка!</p>
            <button id="btn-restart">Играть заново (Пробел)</button>
        </div>
        
        <div id="game-over-screen" class="hidden">
            <h1>ИГРА ОКОНЧЕНА</h1>
            <p>Вы потратили все жизни.</p>
            <button id="btn-restart-fail">Попробовать снова (Пробел)</button>
        </div>
    </div>

    <script>
const IMAGES_SRC = {
    playerRun1: 'run1.png',
    playerRun2: 'run2.png',
    playerJump: 'jump.png',
    playerDuck: 'seat.png',
    playerDead: 'dead.png',
    playerWait: 'wait.png',
    playerHug: 'hug.png',
    item1: 'приз.png',
    item2: 'шпека.png',
    item5: 'билеты.png',
    obsBottom: 'урна.png',
    obsTop1: 'Коп.png',
    obsTop2: 'гоп.png',
    cat: 'cat.png',
    
    bgSky: null, bgCity: null, bgPath: null
};

const images = {};
for (let key in IMAGES_SRC) {
    if (IMAGES_SRC[key]) {
        let img = new Image(); 
        img.src = IMAGES_SRC[key]; 
        images[key] = img;
    } else {
        images[key] = null;
    }
}

const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

// ИСПРАВЛЕНИЕ: ДИНАМИЧЕСКИЙ РАЗМЕР ХОЛСТА (ПОД ЭКРАН)
let CANVAS_WIDTH = window.innerWidth;
let CANVAS_HEIGHT = window.innerHeight;
canvas.width = CANVAS_WIDTH;
canvas.height = CANVAS_HEIGHT;

// Земля всегда находится на 85% высоты экрана
let GROUND_Y = CANVAS_HEIGHT * 0.85;

window.addEventListener('resize', () => {
    CANVAS_WIDTH = window.innerWidth;
    CANVAS_HEIGHT = window.innerHeight;
    canvas.width = CANVAS_WIDTH;
    canvas.height = CANVAS_HEIGHT;
    GROUND_Y = CANVAS_HEIGHT * 0.85;
    player.y = GROUND_Y - player.height;
});

let gameState = 'PLAYING';
let score = 0;
let lives = 3;
let frameCount = 0;

// ИСПРАВЛЕНИЕ: ГЛОБАЛЬНАЯ СКОРОСТЬ
// Теперь gameSpeed сохраняется глобально на всё время, пока открыта вкладка
let gameSpeed = 5.0; // Стартовая, самая медленная скорость
const MAX_SPEED = 14.0; // Максимальная скорость
const SPEED_INCREMENT = 0.002; // Насколько скорость растет каждый кадр (очень плавно)

let obstacles = [];
let items = [];

class Player {
    constructor() {
        this.x = CANVAS_WIDTH * 0.15; // Игрок всегда на 15% экрана слева
        this.normalWidth = 60; 
        this.normalHeight = 120; 
        this.duckHeight = 60;    
        
        this.width = this.normalWidth;
        this.height = this.normalHeight;
        this.y = GROUND_Y - this.normalHeight;
        
        this.vy = 0;
        this.gravity = 0.6;
        this.jumpPower = -14;
        
        this.isJumping = false;
        this.isDucking = false;
        this.duckTimer = 0;
        this.duckDuration = 45;
        this.duckCooldown = 0; 
        this.duckCooldownDuration = 10; 
        
        this.isDead = false;
        this.rotation = 0;
    }

    jump() {
        if (!this.isJumping && !this.isDucking && !this.isDead && gameState === 'PLAYING') {
            this.vy = this.jumpPower;
            this.isJumping = true;
        }
    }

    triggerDuck() {
        if (this.isDead || gameState !== 'PLAYING') return;
        
        if (!this.isJumping && !this.isDucking && this.duckCooldown <= 0) {
            this.isDucking = true;
            this.height = this.duckHeight;
            this.y = GROUND_Y - this.duckHeight;
            this.duckTimer = this.duckDuration;
        }
    }

    update() {
        if (gameState === 'WIN_ANIMATION' || gameState === 'PAUSED') return;
        
        if (this.isJumping) {
            this.y += this.vy;
            this.vy += this.gravity;
            if (this.y + this.height >= GROUND_Y && !this.isDead) {
                this.y = GROUND_Y - this.height;
                this.vy = 0;
                this.isJumping = false;
            }
        }

        if (this.isDucking) {
            this.duckTimer--;
            if (this.duckTimer <= 0) {
                this.isDucking = false;
                this.height = this.normalHeight;
                this.y = GROUND_Y - this.normalHeight;
                this.duckCooldown = this.duckCooldownDuration;
            }
        }
        
        if (this.duckCooldown > 0 && !this.isDucking) {
            this.duckCooldown--;
        }

        if (this.isDead) {
            this.rotation += 0.1;
            this.y += this.vy;
            this.vy += this.gravity;
            if (this.y > CANVAS_HEIGHT + 200) resetRun();
        }
    }

    draw() {
        ctx.save();
        if (this.isDead) {
            ctx.translate(this.x + this.width/2, this.y + this.height/2);
            ctx.rotate(this.rotation);
            ctx.translate(-(this.x + this.width/2), -(this.y + this.height/2));
        }
        
        const drawW = 140; 
        const drawH = 140; 
        const offsetX = -40; 
        const offsetY = this.isDucking ? -80 : -20; 
        
        if (this.isDead && images.playerDead && images.playerDead.complete && images.playerDead.naturalHeight !== 0) {
            ctx.drawImage(images.playerDead, this.x + offsetX, this.y + offsetY, drawW, drawH);
        } else if (this.isDucking && images.playerDuck && images.playerDuck.complete && images.playerDuck.naturalHeight !== 0) {
            ctx.drawImage(images.playerDuck, this.x + offsetX, this.y + offsetY, drawW, drawH);
        } else if (this.isJumping && images.playerJump && images.playerJump.complete && images.playerJump.naturalHeight !== 0) {
            ctx.drawImage(images.playerJump, this.x + offsetX, this.y + offsetY, drawW, drawH);
        } else if (!this.isDead && !this.isJumping && !this.isDucking) {
            let runImg = (frameCount % 20 < 10) ? images.playerRun1 : images.playerRun2;
            if (runImg && runImg.complete && runImg.naturalHeight !== 0) {
                ctx.drawImage(runImg, this.x + offsetX, this.y + offsetY, drawW, drawH);
            } else {
                ctx.fillStyle = 'blue';
                ctx.fillRect(this.x, this.y, this.width, this.height);
            }
        } else {
            ctx.fillStyle = 'blue';
            ctx.fillRect(this.x, this.y, this.width, this.height);
        }
        
        ctx.restore();
    }
}

class Obstacle {
    constructor(isTop, type) {
        this.isTop = isTop;
        this.x = CANVAS_WIDTH;
        if (this.isTop) {
            this.width = 160; 
            this.height = 320; 
            this.y = GROUND_Y - this.height; 
            this.type = type === 1 ? 'police' : 'drunk';
            
            this.hitXOffset = 50;  
            this.hitWidth = 60;    
            this.hitYOffset = 0;   
            this.hitHeight = this.height - 80; 
        } else {
            this.width = 70;
            this.height = 130;
            this.y = GROUND_Y - this.height;
            this.type = 'trash';
            
            this.hitXOffset = 10;
            this.hitWidth = 50;
            this.hitYOffset = 20;
            this.hitHeight = 110;
        }
    }
    update() {
        if (gameState === 'PLAYING') this.x -= gameSpeed;
    }
    draw() {
        if (this.isTop) {
            let img = this.type === 'police' ? images.obsTop1 : images.obsTop2;
            if (img && img.complete && img.naturalHeight !== 0) {
                ctx.drawImage(img, this.x, this.y, this.width, this.height);
            } else {
                ctx.fillStyle = this.type === 'police' ? '#00008B' : '#8B4513';
                ctx.fillRect(this.x + this.hitXOffset, this.y + this.hitYOffset, this.hitWidth, this.hitHeight);
            }
        } else {
            let img = images.obsBottom;
            if (img && img.complete && img.naturalHeight !== 0) {
                ctx.drawImage(img, this.x, this.y, this.width, this.height);
            } else {
                ctx.fillStyle = '#555';
                ctx.fillRect(this.x + this.hitXOffset, this.y + this.hitYOffset, this.hitWidth, this.hitHeight);
            }
        }
    }
}

class Item {
    constructor(scoreValue, forceX, forceY) {
        this.scoreValue = scoreValue;
        this.x = forceX || CANVAS_WIDTH;
        this.y = forceY || (GROUND_Y - player.normalHeight - 120); 
        
        if (this.scoreValue === 1) { 
            this.width = 35; this.height = 100; this.y -= 50;
        } else if (this.scoreValue === 2) { 
            this.width = 60; this.height = 60; this.y -= 20;
        } else if (this.scoreValue === 5) { 
            this.width = 80; this.height = 50;
        }
    }
    update() {
        if (gameState === 'PLAYING') this.x -= gameSpeed;
    }
    draw() {
        let img = null;
        if (this.scoreValue === 1) img = images.item1;
        if (this.scoreValue === 2) img = images.item2;
        if (this.scoreValue === 5) img = images.item5;
        
        if (img && img.complete && img.naturalHeight !== 0) {
            ctx.drawImage(img, this.x, this.y, this.width, this.height);
        } else {
            ctx.fillStyle = this.scoreValue === 1 ? 'lightgreen' : (this.scoreValue === 2 ? 'white' : 'gold');
            ctx.fillRect(this.x, this.y, this.width, this.height);
        }
    }
}

let spawnDistanceQueue = 0; 
let lastObstacleWasTop = false;

function handleSpawning() {
    if (spawnDistanceQueue > 0) {
        spawnDistanceQueue -= gameSpeed;
        return;
    }

    const r = Math.random();
    if (r < 0.03) {
        items.push(new Item(5, CANVAS_WIDTH, GROUND_Y - player.normalHeight - 140));
        obstacles.push(new Obstacle(true, Math.random() > 0.5 ? 1 : 2));
        obstacles[obstacles.length-1].x = CANVAS_WIDTH + 350; 
        spawnDistanceQueue = 900; 
        lastObstacleWasTop = true;
        return;
    }

    const typeRoll = Math.random();
    if (typeRoll < 0.6) {
        let spawnTop = Math.random() > 0.5;
        if (lastObstacleWasTop) spawnTop = false;
        obstacles.push(new Obstacle(spawnTop, Math.random() > 0.5 ? 1 : 2));
        lastObstacleWasTop = spawnTop;
        
        // Дистанция зависит от скорости: чем быстрее игра, тем больше пикселей нужно между препятствиями
        let speedMultiplier = gameSpeed / 5.0;
        spawnDistanceQueue = (Math.random() * 300 + 850) * speedMultiplier; 
    } else {
        let scoreVal = Math.random() < 0.714 ? 1 : 2;
        items.push(new Item(scoreVal));
        spawnDistanceQueue = Math.random() * 200 + 300;
        lastObstacleWasTop = false;
    }
}

const player = new Player();

function togglePause() {
    if (gameState === 'PLAYING') {
        gameState = 'PAUSED';
        document.getElementById('pause-screen').classList.remove('hidden');
    } else if (gameState === 'PAUSED') {
        gameState = 'PLAYING';
        document.getElementById('pause-screen').classList.add('hidden');
    }
}

window.addEventListener('keydown', (e) => {
    if (e.code === 'Space') {
        e.preventDefault();
        if (gameState === 'PLAYING' || gameState === 'PAUSED') {
            togglePause();
        } else if (gameState === 'GAME_OVER' || gameState === 'WIN_ANIMATION') {
            fullRestart(); 
        }
    }
    if (gameState !== 'PLAYING') return;

    if (e.code === 'ArrowUp' || e.code === 'KeyW') player.jump();
    if (e.code === 'ArrowDown' || e.code === 'KeyS') player.triggerDuck();
});

canvas.addEventListener('click', (e) => {
    e.preventDefault();
    if (gameState === 'PLAYING') togglePause();
});

const pauseScreen = document.getElementById('pause-screen');
pauseScreen.addEventListener('click', (e) => {
    e.preventDefault();
    if (gameState === 'PAUSED') togglePause();
});
pauseScreen.addEventListener('touchstart', (e) => {
    e.preventDefault();
    if (gameState === 'PAUSED') togglePause();
}, {passive: false});

const btnJump = document.getElementById('btn-jump');
const btnDuck = document.getElementById('btn-duck');

function handleBtnJump(e) {
    e.preventDefault(); e.stopPropagation();
    if (gameState === 'PLAYING') player.jump();
}
function handleBtnDuck(e) {
    e.preventDefault(); e.stopPropagation();
    if (gameState === 'PLAYING') player.triggerDuck();
}

btnJump.addEventListener('touchstart', handleBtnJump, {passive: false});
btnJump.addEventListener('mousedown', handleBtnJump);

btnDuck.addEventListener('touchstart', handleBtnDuck, {passive: false});
btnDuck.addEventListener('mousedown', handleBtnDuck);

document.getElementById('btn-restart').addEventListener('click', fullRestart);
document.getElementById('btn-restart-fail').addEventListener('click', fullRestart);

function checkCollisions() {
    if (player.isDead || gameState !== 'PLAYING') return;

    const px = player.x;
    const py = player.y;
    const pw = player.width;
    const ph = player.height;

    for (let obs of obstacles) {
        let ox = obs.x + obs.hitXOffset;
        let oy = obs.y + obs.hitYOffset;
        let ow = obs.hitWidth;
        let oh = obs.hitHeight;
        
        if (px < ox + ow && px + pw > ox && py < oy + oh && py + ph > oy) {
            die();
            return;
        }
    }

    for (let i = items.length - 1; i >= 0; i--) {
        let it = items[i];
        if (px < it.x + it.width && px + pw > it.x && py < it.y + it.height && py + ph > it.y) {
            score += it.scoreValue;
            updateUI();
            items.splice(i, 1);
            checkWin();
        }
    }
}

function die() {
    player.isDead = true;
    player.vy = -10;
    player.isDucking = false; 
    player.height = player.normalHeight;
    gameState = 'DEAD_ANIMATION';
    lives--;
    updateUI();
}

function resetRun() {
    if (lives <= 0) {
        gameState = 'GAME_OVER';
        document.getElementById('game-over-screen').classList.remove('hidden');
    } else {
        player.isDead = false;
        player.isDucking = false;
        player.height = player.normalHeight;
        player.y = GROUND_Y - player.normalHeight;
        player.vy = 0;
        player.rotation = 0;
        player.duckTimer = 0;
        player.duckCooldown = 0;
        obstacles = [];
        items = [];
        spawnDistanceQueue = 300;
        gameState = 'PLAYING';
    }
}

function fullRestart() {
    score = 0;
    lives = 3;
    player.isDead = false;
    player.isDucking = false;
    player.height = player.normalHeight;
    player.y = GROUND_Y - player.normalHeight;
    player.vy = 0;
    player.rotation = 0;
    player.duckTimer = 0;
    player.duckCooldown = 0;
    obstacles = [];
    items = [];
    spawnDistanceQueue = 300;
    catX = CANVAS_WIDTH; 
    
    // Сброс скорости ПРИ ПОБЕДЕ ИЛИ GAME OVER
    gameSpeed = 5.0; 
    
    gameState = 'PLAYING';
    document.getElementById('win-screen').classList.add('hidden');
    document.getElementById('game-over-screen').classList.add('hidden');
    document.getElementById('pause-screen').classList.add('hidden');
    updateUI();
}

let catX = CANVAS_WIDTH;

function checkWin() {
    if (score >= 33) {
        gameState = 'WIN_ANIMATION';
        document.getElementById('win-screen').classList.remove('hidden');
    }
}

function drawWinAnimation() {
    if (catX > player.x + player.width + 10) catX -= 4;
    const floatY = Math.sin(frameCount * 0.1) * 3;
    
    const drawW = 140; 
    const drawH = 140;
    const offsetX = -40;
    
    if (catX <= player.x + player.width + 10) {
        if (images.playerHug && images.playerHug.complete && images.playerHug.naturalHeight !== 0) {
            ctx.drawImage(images.playerHug, player.x + offsetX, player.y - 20 + floatY, drawW, drawH);
        } else {
            ctx.fillStyle = 'blue'; ctx.fillRect(player.x, player.y + floatY, player.width, player.normalHeight);
        }
    } else {
        if (images.playerWait && images.playerWait.complete && images.playerWait.naturalHeight !== 0) {
            ctx.drawImage(images.playerWait, player.x + offsetX, player.y - 20 + floatY, drawW, drawH);
        } else {
            ctx.fillStyle = 'blue'; ctx.fillRect(player.x, player.y + floatY, player.width, player.normalHeight);
        }
        
        if (images.cat && images.cat.complete && images.cat.naturalHeight !== 0) {
            ctx.drawImage(images.cat, catX, player.y + 60 + floatY, 60, 60);
        } else {
            ctx.fillStyle = 'orange'; ctx.fillRect(catX, player.y + player.normalHeight - 30 + floatY, 40, 30);
        }
    }
}

function updateUI() {
    document.getElementById('score').innerText = score;
    let hearts = '';
    for(let i=0; i<3; i++) hearts += i < lives ? '❤️' : '🖤';
    document.getElementById('lives').innerText = hearts;
}

function drawBackground() {
    ctx.fillStyle = '#87CEEB';
    ctx.fillRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);
    ctx.fillStyle = '#A9A9A9';
    ctx.fillRect(0, GROUND_Y - 250, CANVAS_WIDTH, 250);
    ctx.fillStyle = '#2E8B57';
    ctx.fillRect(0, GROUND_Y - 150, CANVAS_WIDTH, 150);
    ctx.fillStyle = '#8B4513';
    ctx.fillRect(0, GROUND_Y, CANVAS_WIDTH, CANVAS_HEIGHT - GROUND_Y);
}

function gameLoop() {
    frameCount++;
    drawBackground();

    if (gameState === 'PLAYING') {
        
        // ИСПРАВЛЕНИЕ: ПОСТЕПЕННОЕ УВЕЛИЧЕНИЕ СКОРОСТИ
        // Скорость растет каждый кадр понемногу, пока не достигнет MAX_SPEED
        if (gameSpeed < MAX_SPEED) {
            gameSpeed += SPEED_INCREMENT;
        }

        handleSpawning();
        for (let i = obstacles.length - 1; i >= 0; i--) {
            obstacles[i].update();
            obstacles[i].draw();
            if (obstacles[i].x + obstacles[i].width < 0) obstacles.splice(i, 1);
        }
        for (let i = items.length - 1; i >= 0; i--) {
            items[i].update();
            items[i].draw();
            if (items[i].x + items[i].width < 0) items.splice(i, 1);
        }
        player.update();
        checkCollisions();

    } else if (gameState === 'DEAD_ANIMATION') {
        obstacles.forEach(o => o.draw());
        items.forEach(i => i.draw());
        player.update();
    } else if (gameState === 'WIN_ANIMATION') {
        drawWinAnimation();
    } else if (gameState === 'PAUSED') {
        obstacles.forEach(o => o.draw());
        items.forEach(i => i.draw());
    }

    if (gameState !== 'WIN_ANIMATION') player.draw();
    requestAnimationFrame(gameLoop);
}

updateUI();
