<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Платформер "Мечта"</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; -webkit-user-select: none; }
        body { background-color: #222; color: white; font-family: 'Courier New', Courier, monospace; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        #game-container { position: relative; width: 100vw; height: 100vh; max-width: 1000px; max-height: 600px; background-color: #87CEEB; overflow: hidden; box-shadow: 0 0 20px rgba(0,0,0,0.8); }
        canvas { display: block; width: 100%; height: 100%; cursor: pointer; }
        
        #ui-layer { position: absolute; top: 20px; left: 20px; font-size: 24px; font-weight: bold; color: #fff; text-shadow: 2px 2px 0 #000; pointer-events: none; z-index: 10; }
        #lives-display { margin-top: 10px; }
        
        #park-sign { position: absolute; top: 20px; right: 20px; font-size: 30px; font-weight: 900; color: #FFD700; text-shadow: 3px 3px 0 #8B0000, -1px -1px 0 #000; border: 4px solid #8B0000; background: rgba(255, 255, 255, 0.2); padding: 5px 15px; transform: rotate(2deg); pointer-events: none; z-index: 5; }
        
        #controls { position: absolute; bottom: 20px; left: 0; width: 100%; display: flex; justify-content: space-between; padding: 0 20px; z-index: 10; }
        .control-btn { background: rgba(255, 255, 255, 0.3); border: 2px solid white; border-radius: 10px; color: white; font-size: 16px; font-weight: bold; padding: 15px 30px; cursor: pointer; backdrop-filter: blur(5px); touch-action: manipulation; }
        .control-btn:active { background: rgba(255, 255, 255, 0.6); }
        
        #win-screen, #game-over-screen, #pause-screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.8); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 20; }
        #win-screen h1, #game-over-screen h1, #pause-screen h1 { font-size: 50px; color: #FFD700; margin-bottom: 20px; text-shadow: 2px 2px 0 #000; }
        #win-screen p, #game-over-screen p, #pause-screen p { font-size: 24px; margin-bottom: 30px; }
        #win-screen button, #game-over-screen button { background: #FFD700; color: #000; border: none; padding: 15px 30px; font-size: 20px; font-weight: bold; cursor: pointer; border-radius: 5px; transition: 0.2s; }
        #win-screen button:hover, #game-over-screen button:hover { background: #FFF; }
        
        #pause-screen { cursor: pointer; }
        .hidden { display: none !important; }
        
        @media (max-width: 600px) { #ui-layer { font-size: 18px; } #park-sign { font-size: 20px; top: 10px; right: 10px; } .control-btn { font-size: 14px; padding: 10px 15px; } }
    </style>
</head>
<body>
    <div id="game-container">
        <canvas id="gameCanvas"></canvas>
        
        <div id="ui-layer">
            <div id="score-display">Очки: <span id="score">0</span> / 33</div>
            <div id="lives-display">Жизни: <span id="lives">❤️❤️❤️</span></div>
        </div>

        <div id="park-sign">Парк "МЕЧТА"</div>

        <div id="controls">
            <button id="btn-duck" class="control-btn">ПРИСЕСТЬ (S / Вниз)</button>
            <button id="btn-jump" class="control-btn">ПРЫЖОК (W / Вверх)</button>
        </div>
        
        <div id="pause-screen" class="hidden">
            <h1>ПАУЗА</h1>
            <p>Кликните по экрану или нажмите Пробел, чтобы продолжить</p>
        </div>

        <div id="win-screen" class="hidden">
            <h1>ПОБЕДА!</h1>
            <p>Вы набрали 33 очка!</p>
            <button id="btn-restart">Играть заново</button>
        </div>
        
        <div id="game-over-screen" class="hidden">
            <h1>ИГРА ОКОНЧЕНА</h1>
            <p>Вы потратили все жизни.</p>
            <button id="btn-restart-fail">Попробовать снова</button>
        </div>
    </div>

    <script>
// ЗАГРУЗИЛИ БУТЫЛКУ (Убрали зависимость от успешной предзагрузки для старта)
const IMAGES_SRC = {
    playerRun: 'run.png',
    playerJump: 'jump.png',
    playerDuck: 'seat.png',
    item1: 'приз.png',
    
    bgSky: null, bgCity: null, bgPath: null, playerDead: null,
    item2: null, item5: null, obsBottom: null, obsTop1: null, obsTop2: null, cat: null
};

const images = {};
for (let key in IMAGES_SRC) {
    if (IMAGES_SRC[key]) {
        let img = new Image(); img.src = IMAGES_SRC[key]; images[key] = img;
    } else {
        images[key] = null;
    }
}

const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

const CANVAS_WIDTH = 1000;
const CANVAS_HEIGHT = 600;
canvas.width = CANVAS_WIDTH;
canvas.height = CANVAS_HEIGHT;

const GROUND_Y = 500;

let gameState = 'PLAYING';
let score = 0;
let lives = 3;
let gameSpeed = 6;
let frameCount = 0;

let obstacles = [];
let items = [];

class Player {
    constructor() {
        this.x = 150;
        this.normalWidth = 60; // Возвращаем строгие хитбоксы, чтобы было честно играть
        this.normalHeight = 120;
        this.duckHeight = 60; 
        
        this.width = this.normalWidth;
        this.height = this.normalHeight;
        this.y = GROUND_Y - this.normalHeight; // ИСПРАВЛЕНИЕ: точная позиция старта
        
        this.vy = 0;
        this.gravity = 0.6;
        this.jumpPower = -14;
        
        this.isJumping = false;
        this.isDucking = false;
        this.duckTimer = 0;
        this.duckDuration = 45;
        this.duckCooldown = 0; 
        this.duckCooldownDuration = 10; 
        
        this.isDead = false;
        this.rotation = 0;
    }

    jump() {
        if (!this.isJumping && !this.isDucking && !this.isDead && gameState === 'PLAYING') {
            this.vy = this.jumpPower;
            this.isJumping = true;
        }
    }

    triggerDuck() {
        if (this.isDead || gameState !== 'PLAYING') return;
        
        if (!this.isJumping && !this.isDucking && this.duckCooldown <= 0) {
            this.isDucking = true;
            this.height = this.duckHeight;
            this.y = GROUND_Y - this.duckHeight;
            this.duckTimer = this.duckDuration;
        }
    }

    update() {
        if (gameState === 'WIN_ANIMATION' || gameState === 'PAUSED') return;
        
        if (this.isJumping) {
            this.y += this.vy;
            this.vy += this.gravity;
            if (this.y + this.height >= GROUND_Y && !this.isDead) {
                this.y = GROUND_Y - this.height;
                this.vy = 0;
                this.isJumping = false;
            }
        }

        if (this.isDucking) {
            this.duckTimer--;
            if (this.duckTimer <= 0) {
                this.isDucking = false;
                this.height = this.normalHeight;
                this.y = GROUND_Y - this.normalHeight;
                this.duckCooldown = this.duckCooldownDuration;
            }
        }
        
        if (this.duckCooldown > 0 && !this.isDucking) {
            this.duckCooldown--;
        }

        if (this.isDead) {
            this.rotation += 0.1;
            this.y += this.vy;
            this.vy += this.gravity;
            if (this.y > CANVAS_HEIGHT + 200) resetRun();
        }
    }

    draw() {
        ctx.save();
        if (this.isDead) {
            ctx.translate(this.x + this.width/2, this.y + this.height/2);
            ctx.rotate(this.rotation);
            ctx.translate(-(this.x + this.width/2), -(this.y + this.height/2));
        }
        
        // Размеры картинок для правильных пропорций (шире хитбокса)
        const drawW = 120; 
        const drawH = 120;
        const offsetX = -30; // Центрируем широкую картинку относительно узкого хитбокса
        const offsetY = this.isDucking ? -60 : 0; // Приподнимаем присевшего, чтобы он не провалился
        
        // ИСПРАВЛЕНИЕ: Добавили playerDead для анимации смерти
        if (this.isDead && images.playerDead && images.playerDead.complete) {
            ctx.drawImage(images.playerDead, this.x + offsetX, this.y + offsetY, drawW, drawH);
        } else if (this.isDucking && images.playerDuck && images.playerDuck.complete) {
            ctx.drawImage(images.playerDuck, this.x + offsetX, this.y + offsetY, drawW, drawH);
        } else if (this.isJumping && images.playerJump && images.playerJump.complete) {
            // Прыжок шире, даем ему больше ширины
            ctx.drawImage(images.playerJump, this.x - 40, this.y, 140, drawH);
        } else if (!this.isDead && !this.isJumping && !this.isDucking && images.playerRun && images.playerRun.complete) {
            ctx.drawImage(images.playerRun, this.x + offsetX, this.y + offsetY, drawW, drawH);
        } else {
            // Квадратики смерти теперь работают!
            ctx.fillStyle = this.isDead ? 'red' : (this.isDucking ? 'purple' : 'blue');
            ctx.fillRect(this.x, this.y, this.width, this.height);
            ctx.fillStyle = '#ffcc99';
            ctx.fillRect(this.x - 10, this.y - (this.isDucking?10:20), this.width + 20, this.isDucking?40:60);
        }
        
        ctx.restore();
    }
}

class Obstacle {
    constructor(isTop, type) {
        this.isTop = isTop;
        this.x = CANVAS_WIDTH;
        if (this.isTop) {
            this.width = 80;
            this.height = GROUND_Y - player.duckHeight - 10; 
            this.y = GROUND_Y - this.height - player.duckHeight - 10;
            this.type = type === 1 ? 'police' : 'drunk';
        } else {
            this.width = 60;
            this.height = 130;
            this.y = GROUND_Y - this.height;
            this.type = 'trash';
        }
    }
    update() {
        if (gameState === 'PLAYING') this.x -= gameSpeed;
    }
    draw() {
        if (this.isTop) {
            ctx.fillStyle = this.type === 'police' ? '#00008B' : '#8B4513';
        } else {
            ctx.fillStyle = '#555';
        }
        ctx.fillRect(this.x, this.y, this.width, this.height);
        
        ctx.fillStyle = 'white';
        ctx.font = '14px Arial';
        ctx.fillText(this.isTop ? (this.type==='police'?'Коп':'Алкаш') : 'Урна', this.x + 5, this.y + 30);
    }
}

class Item {
    constructor(scoreValue, forceX, forceY) {
        this.scoreValue = scoreValue;
        this.x = forceX || CANVAS_WIDTH;
        this.y = forceY || (GROUND_Y - player.normalHeight - 120); 
        this.width = (this.scoreValue === 1 && images.item1) ? 35 : 40;
        
        // Для бутылки пива делаем пропорции более вытянутыми
        this.height = (this.scoreValue === 1 && images.item1) ? 100 : 40; 
        if (this.scoreValue === 1 && images.item1) this.y -= 60; 
    }
    update() {
        if (gameState === 'PLAYING') this.x -= gameSpeed;
    }
    draw() {
        if (this.scoreValue === 1 && images.item1 && images.item1.complete && images.item1.naturalHeight !== 0) {
            ctx.drawImage(images.item1, this.x, this.y, this.width, this.height);
        } else {
            if (this.scoreValue === 1) ctx.fillStyle = 'lightgreen';
            else if (this.scoreValue === 2) ctx.fillStyle = 'white';
            else if (this.scoreValue === 5) ctx.fillStyle = 'gold';
            
            ctx.fillRect(this.x, this.y, this.width, this.height);
            ctx.fillStyle = 'black';
            ctx.fillText(`+${this.scoreValue}`, this.x + 5, this.y + 25);
        }
    }
}

let spawnDistanceQueue = 0; 
let lastObstacleWasTop = false;

function handleSpawning() {
    if (spawnDistanceQueue > 0) {
        spawnDistanceQueue -= gameSpeed;
        return;
    }

    const r = Math.random();
    if (r < 0.03) {
        items.push(new Item(5, CANVAS_WIDTH, GROUND_Y - player.normalHeight - 130));
        obstacles.push(new Obstacle(true, Math.random() > 0.5 ? 1 : 2));
        obstacles[obstacles.length-1].x = CANVAS_WIDTH + 350; 
        spawnDistanceQueue = 600;
        lastObstacleWasTop = true;
        return;
    }

     const typeRoll = Math.random();
    if (typeRoll < 0.6) {
        let spawnTop = Math.random() > 0.5;
        if (lastObstacleWasTop) spawnTop = false;
        obstacles.push(new Obstacle(spawnTop, Math.random() > 0.5 ? 1 : 2));
        lastObstacleWasTop = spawnTop;
        // БЫЛО: Math.random() * 200 + 400;
        // СТАЛО: (Минимум 600 пикселей между препятствиями)
        spawnDistanceQueue = Math.random() * 200 + 600; 
    } else {
        let scoreVal = Math.random() < 0.714 ? 1 : 2;
        items.push(new Item(scoreVal));
        spawnDistanceQueue = Math.random() * 150 + 200;
        lastObstacleWasTop = false;
    }
}

const player = new Player();

function togglePause() {
    if (gameState === 'PLAYING') {
        gameState = 'PAUSED';
        document.getElementById('pause-screen').classList.remove('hidden');
    } else if (gameState === 'PAUSED') {
        gameState = 'PLAYING';
        document.getElementById('pause-screen').classList.add('hidden');
    }
}

window.addEventListener('keydown', (e) => {
    if (e.code === 'Space') {
        e.preventDefault();
        if (gameState === 'PLAYING' || gameState === 'PAUSED') togglePause();
    }
    if (gameState !== 'PLAYING') return;

    if (e.code === 'ArrowUp' || e.code === 'KeyW') player.jump();
    if (e.code === 'ArrowDown' || e.code === 'KeyS') player.triggerDuck();
});

canvas.addEventListener('click', (e) => {
    e.preventDefault();
    if (gameState === 'PLAYING') togglePause();
});

const pauseScreen = document.getElementById('pause-screen');
pauseScreen.addEventListener('click', (e) => {
    e.preventDefault();
    if (gameState === 'PAUSED') togglePause();
});
pauseScreen.addEventListener('touchstart', (e) => {
    e.preventDefault();
    if (gameState === 'PAUSED') togglePause();
}, {passive: false});

const btnJump = document.getElementById('btn-jump');
const btnDuck = document.getElementById('btn-duck');

function handleBtnJump(e) {
    e.preventDefault(); e.stopPropagation();
    if (gameState === 'PLAYING') player.jump();
}
function handleBtnDuck(e) {
    e.preventDefault(); e.stopPropagation();
    if (gameState === 'PLAYING') player.triggerDuck();
}

btnJump.addEventListener('touchstart', handleBtnJump, {passive: false});
btnJump.addEventListener('mousedown', handleBtnJump);

btnDuck.addEventListener('touchstart', handleBtnDuck, {passive: false});
btnDuck.addEventListener('mousedown', handleBtnDuck);

document.getElementById('btn-restart').addEventListener('click', fullRestart);
document.getElementById('btn-restart-fail').addEventListener('click', fullRestart);

function checkCollisions() {
    if (player.isDead || gameState !== 'PLAYING') return;

    const px = player.x + 10;
    const py = player.y + 10;
    const pw = player.width - 20;
    const ph = player.height - 20;

    for (let obs of obstacles) {
        if (px < obs.x + obs.width && px + pw > obs.x && py < obs.y + obs.height && py + ph > obs.y) {
            die();
            return;
        }
    }

    for (let i = items.length - 1; i >= 0; i--) {
        let it = items[i];
        if (px < it.x + it.width && px + pw > it.x && py < it.y + it.height && py + ph > it.y) {
            score += it.scoreValue;
            updateUI();
            items.splice(i, 1);
            checkWin();
        }
    }
}

function die() {
    player.isDead = true;
    player.vy = -10;
    player.isDucking = false; 
    player.height = player.normalHeight;
    gameState = 'DEAD_ANIMATION';
    lives--;
    updateUI();
}

function resetRun() {
    if (lives <= 0) {
        gameState = 'GAME_OVER';
        document.getElementById('game-over-screen').classList.remove('hidden');
    } else {
        player.isDead = false;
        player.isDucking = false;
        player.height = player.normalHeight;
        player.y = GROUND_Y - player.normalHeight;
        player.vy = 0;
        player.rotation = 0;
        player.duckTimer = 0;
        player.duckCooldown = 0;
        obstacles = [];
        items = [];
        spawnDistanceQueue = 300;
        gameState = 'PLAYING';
    }
}

function fullRestart() {
    score = 0;
    lives = 3;
    player.isDead = false;
    player.isDucking = false;
    player.height = player.normalHeight;
    player.y = GROUND_Y - player.normalHeight;
    player.vy = 0;
    player.rotation = 0;
    player.duckTimer = 0;
    player.duckCooldown = 0;
    obstacles = [];
    items = [];
    spawnDistanceQueue = 300;
    gameState = 'PLAYING';
    document.getElementById('win-screen').classList.add('hidden');
    document.getElementById('game-over-screen').classList.add('hidden');
    document.getElementById('pause-screen').classList.add('hidden');
    updateUI();
}

let catX = CANVAS_WIDTH;

function checkWin() {
    if (score >= 33) {
        gameState = 'WIN_ANIMATION';
        document.getElementById('win-screen').classList.remove('hidden');
    }
}

function drawWinAnimation() {
    if (catX > player.x + player.width + 10) catX -= 4;
    const floatY = Math.sin(frameCount * 0.1) * 3;
    
    ctx.fillStyle = 'blue';
    ctx.fillRect(player.x, player.y + floatY, player.width, player.normalHeight);
    
    ctx.fillStyle = '#ffcc99';
    ctx.fillRect(player.x - 10, player.y - 20 + floatY, player.width + 20, 60);
    
    ctx.fillStyle = 'orange';
    ctx.fillRect(catX, player.y + player.normalHeight - 30 + floatY, 40, 30);
    ctx.fillStyle = 'black';
    ctx.fillText('Мяу', catX, player.y + player.normalHeight - 35 + floatY);
}

function updateUI() {
    document.getElementById('score').innerText = score;
    let hearts = '';
    for(let i=0; i<3; i++) hearts += i < lives ? '❤️' : '🖤';
    document.getElementById('lives').innerText = hearts;
}

let bgOffset = 0;
function drawBackground() {
    // В будущем тут будут твои картинки (bgSky, bgCity, bgPath)
    ctx.fillStyle = '#87CEEB';
    ctx.fillRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);
    ctx.fillStyle = '#A9A9A9';
    ctx.fillRect(0, GROUND_Y - 250, CANVAS_WIDTH, 250);
    ctx.fillStyle = '#2E8B57';
    ctx.fillRect(0, GROUND_Y - 150, CANVAS_WIDTH, 150);
    ctx.fillStyle = '#8B4513';
    ctx.fillRect(0, GROUND_Y, CANVAS_WIDTH, CANVAS_HEIGHT - GROUND_Y);
}

function gameLoop() {
    frameCount++;
    drawBackground();

    if (gameState === 'PLAYING') {
        handleSpawning();
        for (let i = obstacles.length - 1; i >= 0; i--) {
            obstacles[i].update();
            obstacles[i].draw();
            if (obstacles[i].x + obstacles[i].width < 0) obstacles.splice(i, 1);
        }
        for (let i = items.length - 1; i >= 0; i--) {
            items[i].update();
            items[i].draw();
            if (items[i].x + items[i].width < 0) items.splice(i, 1);
        }
        player.update();
        checkCollisions();
        
        if (frameCount % 600 === 0 && gameSpeed < 12) gameSpeed += 0.5;

    } else if (gameState === 'DEAD_ANIMATION') {
        obstacles.forEach(o => o.draw());
        items.forEach(i => i.draw());
        player.update();
    } else if (gameState === 'WIN_ANIMATION') {
        drawWinAnimation();
    } else if (gameState === 'PAUSED') {
        obstacles.forEach(o => o.draw());
        items.forEach(i => i.draw());
    }

    if (gameState !== 'WIN_ANIMATION') player.draw();
    requestAnimationFrame(gameLoop);
}

updateUI();
gameLoop();
    </script>
